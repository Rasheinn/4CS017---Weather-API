<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>My weather app</title>
  </head>
  <body>
	<h1>Weather in colombo</h1>
	<p id="theTemp">Please wait...</p>
	<p id="description">Please wait...</p>
	<p id="myLastUpdated">Please wait...</p>
	
	<script>
	
			// Check browser cache first, use if there and less than 10 seconds old
		if(localStorage.when != null
		   && parseInt(localStorage.when) + 10000 > Date.now()) {

			  let freshness = Math.round((Date.now() - localStorage.when)/1000) + " second(s)";
			  document.getElementById("theTemp").innerHTML = localStorage.theTemp;
			  document.getElementById("description").innerHTML = localStorage.description;
			  document.getElementById("myLastUpdated").innerHTML = freshness;
			
		// No local cache, access network
		} else {

		
		// Fetch Colombo weather data from API
		fetch('https://mi-linux.wlv.ac.uk/~2441880/my-api.php?city=colombo')
			
		// Convert response string to json object
		  .then(response => response.json())
		  .then(response => {

		// Display whole API response in browser console (take a look at it!)
			//console.log(response);
				
		// Copy one element of response to our HTML paragraph
			document.getElementById("theTemp").innerHTML = 'Temperature: ' + response.weather_temperature+ '°C';
			document.getElementById("description").innerHTML ='Weather: ' + response.weather_description;
			document.getElementById("myLastUpdated").innerHTML ='Last Updated: ' + response.weather_when;
			
		// Save new data to browser, with new timestamp
			localStorage.description = response.weather_description;
			localStorage.theTemp = response.weather_temperature + '°';
			localStorage.when = Date.now(); // milliseconds since January 1 1970
			
			
		  })
		  .catch(err => {
			
		// Display errors in console
			console.log(err);											
		});
	}
	</script>								   
											
  </body>
</html>
